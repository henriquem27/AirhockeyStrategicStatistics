name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: AHLabeler-mac-arm64.zip
          - os: windows-latest
            artifact: AHLabeler-windows.zip

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyinstaller PyQt6 opencv-python numpy pandas

      - name: Build with PyInstaller
        run: pyinstaller AHLabeler.spec

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../AHLabeler-mac-arm64.zip AHLabeler.app

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\AHLabeler -DestinationPath AHLabeler-windows.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
